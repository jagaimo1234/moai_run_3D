<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MOAI ROBO OPEN WORLD</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent-color: #00d2ff;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            touch-action: none;
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        #ui-container {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            right: auto;
            pointer-events: none;
            z-index: 10;
        }

        #ui-text {
            background: linear-gradient(135deg, rgba(4, 10, 15, 0.88), rgba(17, 22, 28, 0.72));
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 216, 122, 0.34);
            padding: 11px 12px 10px;
            border-radius: 8px;
            font-size: 12px;
            display: inline-block;
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.48), inset 0 1px 0 rgba(255,255,255,0.08);
            width: min(430px, calc(100vw - 132px));
            line-height: 1.35;
            text-shadow: 0 1px 6px rgba(0,0,0,0.85);
        }

        .hud-main {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .hud-title {
            color: #fff6cf;
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .hud-pill {
            display: inline-block;
            padding: 3px 7px;
            border-radius: 6px;
            background: rgba(119, 244, 255, 0.15);
            border: 1px solid rgba(119, 244, 255, 0.25);
            color: #e8feff;
            white-space: nowrap;
        }

        .hud-danger {
            background: rgba(255, 79, 99, 0.18);
            border-color: rgba(255, 118, 136, 0.36);
            color: #ffd9df;
        }

        .hud-yogurt-panel {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 9px;
            align-items: center;
            padding: 9px;
            border-radius: 8px;
            background: rgba(255, 246, 210, 0.09);
            border: 1px solid rgba(255, 216, 122, 0.22);
        }

        .hud-yogurt-count {
            min-width: 76px;
            text-align: center;
            color: #fff6cf;
            font-weight: 900;
            font-size: 24px;
        }

        .hud-yogurt-count small {
            display: block;
            color: rgba(255,255,255,0.66);
            font-size: 9px;
            font-weight: 800;
        }

        .hud-meter {
            height: 9px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(255,255,255,0.13);
            border: 1px solid rgba(255,255,255,0.14);
        }

        .hud-meter-fill {
            height: 100%;
            width: var(--hud-progress, 0%);
            border-radius: inherit;
            background: linear-gradient(90deg, #77f4ff, #fff07a, #ff8a63);
            box-shadow: 0 0 14px rgba(255, 240, 122, 0.42);
        }

        .hud-steps {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .hud-step {
            padding: 2px 6px;
            border-radius: 6px;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.66);
            font-size: 10px;
            font-weight: 800;
        }

        .hud-step.done {
            background: rgba(119, 244, 255, 0.16);
            color: #dffcff;
        }

        .hud-step.warn {
            background: rgba(255, 200, 87, 0.16);
            color: #ffe4a0;
        }

        .hud-goal {
            margin-top: 7px;
            color: rgba(255,255,255,0.9);
        }

        .hud-controls {
            margin-top: 5px;
            color: rgba(255,255,255,0.58);
            font-size: 10px;
        }

        #shop-dialog {
            position: absolute;
            left: 50%;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
            transform: translateX(-50%);
            z-index: 18;
            display: none;
            width: min(420px, calc(100vw - 28px));
            padding: 12px;
            border-radius: 8px;
            background: rgba(7, 18, 24, 0.88);
            border: 1px solid rgba(255, 216, 122, 0.42);
            box-shadow: 0 18px 40px rgba(0,0,0,0.48);
            backdrop-filter: blur(16px);
            pointer-events: auto;
        }

        .shop-line {
            color: #fff6cf;
            font-weight: 900;
            font-size: 14px;
            margin-bottom: 10px;
            text-shadow: 0 1px 8px rgba(0,0,0,0.9);
        }

        .shop-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .shop-actions button {
            min-height: 42px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.18);
            font-family: 'Outfit', 'DotGothic16', sans-serif;
            font-weight: 900;
            color: #101a20;
            background: linear-gradient(135deg, #fff07a, #ffba63);
            cursor: pointer;
        }

        .shop-actions button.secondary {
            color: #e8feff;
            background: rgba(119, 244, 255, 0.12);
            border-color: rgba(119, 244, 255, 0.3);
        }

        .shop-actions button.wide {
            grid-column: span 2;
        }

        #catalog-overlay {
            position: absolute;
            inset: 0;
            z-index: 40;
            display: none;
            background: rgba(4, 9, 13, 0.9);
            pointer-events: auto;
        }

        #catalog-frame {
            position: absolute;
            inset: max(env(safe-area-inset-top, 10px), 10px) 10px max(env(safe-area-inset-bottom, 10px), 10px);
            width: calc(100% - 20px);
            height: calc(100% - max(env(safe-area-inset-top, 10px), 10px) - max(env(safe-area-inset-bottom, 10px), 10px));
            border: 1px solid rgba(255, 216, 122, 0.4);
            border-radius: 8px;
            background: #fff;
        }

        #catalog-close {
            position: absolute;
            top: max(env(safe-area-inset-top, 14px), 14px);
            right: 18px;
            z-index: 42;
            border: 1px solid rgba(255,255,255,0.28);
            border-radius: 8px;
            padding: 9px 14px;
            font-family: 'Outfit', 'DotGothic16', sans-serif;
            font-weight: 900;
            color: #101a20;
            background: #fff07a;
            box-shadow: 0 10px 24px rgba(0,0,0,0.35);
            cursor: pointer;
        }

        #controls {
            position: absolute;
            right: 24px;
            bottom: env(safe-area-inset-bottom, 28px);
            z-index: 15;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .btn-joystick {
            width: 86px;
            height: 86px;
            background: rgba(255, 95, 69, 0.18);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 170, 120, 0.7);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0;
            color: #fff3e8;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.16s ease, background 0.16s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            user-select: none;
        }

        .btn-joystick:active {
            transform: scale(0.9);
            background: rgba(255, 95, 69, 0.28);
            border-color: var(--accent-color);
        }

        #btn-help {
            display: none;
            margin-bottom: 10px;
            background: rgba(74, 183, 255, 0.2);
            border-color: rgba(119, 244, 255, 0.72);
            color: #dcfbff;
        }

        #btn-help.disabled {
            opacity: 0.5;
            filter: grayscale(0.35);
        }

        #mobile-stick {
            position: absolute;
            left: 0;
            top: 0;
            width: 86px;
            height: 86px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.18);
            transform: translate(-50%, -50%);
            display: none;
            z-index: 18;
            pointer-events: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        #mobile-stick::after {
            content: "";
            position: absolute;
            left: calc(50% + var(--stick-x, 0px));
            top: calc(50% + var(--stick-y, 0px));
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(119,244,255,0.72);
            border: 2px solid rgba(255,255,255,0.7);
            transform: translate(-50%, -50%);
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 50% 34%, rgba(119, 244, 255, 0.18), transparent 28%),
                radial-gradient(circle at 76% 22%, rgba(177, 132, 255, 0.16), transparent 24%),
                linear-gradient(180deg, #111827 0%, #071316 52%, #020405 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
            transition: opacity 0.5s ease;
            overflow: hidden;
        }

        .start-card {
            text-align: center;
            background: rgba(4, 11, 16, 0.62);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(119, 244, 255, 0.25);
            padding: 28px;
            border-radius: 8px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.8);
            max-width: min(680px, calc(100vw - 34px));
            box-sizing: border-box;
        }

        .open-world-card {
            border-color: rgba(119, 244, 255, 0.45);
        }

        .title-scene {
            position: relative;
            width: min(760px, calc(100vw - 24px));
            min-height: min(720px, calc(100vh - 24px));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 26px 14px;
            box-sizing: border-box;
        }

        .title-moon {
            position: absolute;
            width: clamp(76px, 18vw, 132px);
            height: clamp(76px, 18vw, 132px);
            border-radius: 50%;
            right: 8%;
            top: 6%;
            background: #d9ecff;
            box-shadow: 0 0 36px rgba(137, 216, 255, 0.75), 0 0 90px rgba(137, 216, 255, 0.32);
        }

        .title-ground {
            position: absolute;
            left: -10%;
            right: -10%;
            bottom: 0;
            height: 34%;
            background:
                linear-gradient(90deg, transparent 0 7%, rgba(97, 246, 255, 0.18) 7% 8%, transparent 8% 18%),
                linear-gradient(0deg, rgba(39, 59, 52, 0.92), rgba(39, 59, 52, 0.12));
            transform: skewY(-3deg);
        }

        .title-moai {
            position: absolute;
            left: 13%;
            bottom: 23%;
            width: clamp(72px, 18vw, 132px);
            height: clamp(118px, 28vw, 210px);
            background: linear-gradient(180deg, #b5bdb8, #6d7772);
            border-radius: 18px 18px 12px 12px;
            box-shadow: inset -10px 0 0 rgba(0,0,0,0.18), 0 16px 28px rgba(0,0,0,0.45);
        }

        .title-moai::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 34%;
            width: 26%;
            height: 27%;
            background: #8f9690;
            transform: translateX(-50%);
            border-radius: 5px;
            box-shadow: -24px -14px 0 -8px #1d2525, 24px -14px 0 -8px #1d2525;
        }

        .title-author {
            position: absolute;
            right: 15%;
            bottom: 24%;
            width: clamp(86px, 19vw, 150px);
            height: clamp(116px, 25vw, 196px);
            background: rgba(255, 95, 69, 0.18);
            border: 2px solid rgba(255, 127, 102, 0.66);
            border-radius: 50% 50% 14px 14px;
            box-shadow: 0 0 26px rgba(255, 95, 69, 0.42);
        }

        .title-author::after {
            content: "作者";
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: #fff1ed;
            font-weight: 800;
            font-size: clamp(20px, 5vw, 34px);
            text-shadow: 0 2px 12px rgba(0,0,0,0.85);
        }

        .title-content {
            position: relative;
            z-index: 2;
            width: min(580px, 100%);
        }

        .title-kicker {
            color: #77f4ff;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.18em;
            margin-bottom: 8px;
        }

        .title-copy {
            color: rgba(255,255,255,0.84);
            font-size: clamp(13px, 3.4vw, 16px);
            line-height: 1.55;
            margin: 0 auto 18px;
            max-width: 520px;
        }

        .mission-readout {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 16px 0;
            font-size: 13px;
            color: rgba(255,255,255,0.82);
        }

        .stage-select {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 18px;
            pointer-events: auto;
        }

        .stage-button {
            min-width: 126px;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(119, 244, 255, 0.55);
            background: rgba(14, 28, 36, 0.72);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            letter-spacing: 0;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0,0,0,0.28);
        }

        .stage-button.stage-night {
            border-color: rgba(177, 132, 255, 0.78);
            background: rgba(28, 22, 48, 0.78);
        }

        .stage-button span {
            display: block;
            margin-top: 3px;
            font-size: 10px;
            color: rgba(255,255,255,0.64);
            line-height: 1.1;
        }

        .event-links {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 14px;
            pointer-events: auto;
        }

        .event-link-button {
            border: 1px solid rgba(255,255,255,0.34);
            background: rgba(0,0,0,0.32);
            color: #fff;
            padding: 9px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Outfit', 'DotGothic16', sans-serif;
        }

        .event-link-button.catalog {
            border-color: rgba(0, 210, 255, 0.55);
            color: #77f4ff;
            background: rgba(0, 210, 255, 0.12);
        }

        .start-button {
            background: #77f4ff;
            color: #071316;
            border: 0;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 800;
            cursor: pointer;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tap-msg {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        @media (max-width: 520px) {
            #ui-container {
                left: 12px;
                right: 12px;
            }
            #controls {
                right: 14px;
            }
            .btn-joystick {
                width: 76px;
                height: 76px;
                font-size: 13px;
            }
            #ui-text {
                font-size: 8px;
                width: min(260px, calc(100vw - 118px));
                padding: 5px 6px;
                line-height: 1.12;
                border-radius: 6px;
                box-shadow: 0 8px 20px rgba(0,0,0,0.42);
            }
            .hud-main {
                gap: 4px;
                margin-bottom: 3px;
            }
            .hud-title {
                font-size: 9px;
            }
            .hud-pill {
                padding: 1px 4px;
                border-radius: 5px;
            }
            .hud-yogurt-panel {
                grid-template-columns: 46px 1fr;
                gap: 4px;
                padding: 4px;
                border-radius: 6px;
            }
            .hud-yogurt-count {
                min-width: 44px;
                font-size: 15px;
            }
            .hud-yogurt-count small {
                font-size: 7px;
            }
            .hud-meter {
                height: 5px;
            }
            .hud-steps {
                gap: 3px;
                margin-top: 4px;
            }
            .hud-step {
                padding: 1px 3px;
                border-radius: 5px;
                font-size: 7px;
            }
            .hud-goal {
                margin-top: 4px;
            }
            .hud-controls {
                display: none;
            }
        }

        .retro-btn {
            position: absolute;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 10;
            outline: none;
            -webkit-tap-highlight-color: transparent; /* Remove blue highlight on mobile */
            color: transparent; /* Hide text if any is added for accessibility */
        }

        
        /* Approximate hitboxes based on the image proportions */
        .btn-retry {
            top: 53.5%;
            left: 14%;
            width: 72%;
            height: 9.5%;
        }

        .btn-follow {
            top: 65%;
            left: 11%;
            width: 78%;
            height: 9.5%;
        }

        .btn-x {
            top: 75.5%;
            left: 29.5%;
            width: 15%;
            height: 12.5%;
        }

        .btn-insta {
            top: 75.5%;
            left: 54%;
            width: 15%;
            height: 12.5%;
        }

        .btn-revenge-back {
            display: none;
            position: absolute;
            top: 140px;
            right: 20px;
            background: linear-gradient(135deg, #00d2ff, #0084ff);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 180, 255, 0.4);
            z-index: 99;
            pointer-events: auto;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Outfit', 'DotGothic16', sans-serif;
            letter-spacing: 0.5px;
        }

        .btn-revenge-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 180, 255, 0.6);
        }

        .btn-revenge-back:active {
            transform: translateY(1px) scale(0.95);
            box-shadow: 0 2px 8px rgba(0, 180, 255, 0.3);
        }

    </style>
</head>

<body>
    <div id="ui-container">
        <div id="ui-text">左ドラッグ 移動  右ドラッグ 視点  DASH ダッシュ  作者から逃げろ</div>
    </div>

    <div id="start-screen">
        <div class="title-scene">
            <div class="title-moon"></div>
            <div class="title-ground"></div>
            <div class="title-moai"></div>
            <div class="title-author"></div>
            <div class="start-card open-world-card title-content">
                <div class="title-kicker">MOAI CHASE SURVIVAL</div>
                <h1 style="font-size: clamp(30px, 8vw, 52px); margin: 0 0 10px;">MOAI ROBO OPEN WORLD</h1>
                <p class="title-copy">HMJ特別ステージ！ヨーグルトを集め、増殖する作者から逃げ切れ。ブースの間を駆け抜けろ。</p>
                <div class="stage-select">
                    <button class="stage-button" type="button" data-stage="4" style="font-size: 16px; padding: 14px 28px; min-width: 180px;">ゲームスタート<br><span>STAGE 4: HMJ HALL</span></button>
                </div>
                <div class="mission-readout">
                    <span>左ドラッグ: 移動</span>
                    <span>右ドラッグ: 視点</span>
                    <span>DASH: 走る</span>
                    <span>音あり推奨</span>
                </div>
                <div class="event-links">
                    <button class="event-link-button" type="button" onclick="event.stopPropagation(); window.open('https://hmj-fes.jp/', '_blank')">HMJ公式サイト</button>
                    <button class="event-link-button catalog" type="button" onclick="event.stopPropagation(); location.href='catalog.html?v=20260526_1'">お品書き</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mobile-stick" aria-hidden="true"></div>
    <div id="controls">
        <div id="btn-help" class="btn-joystick">HELP</div>
        <div id="btn-fire" class="btn-joystick">DASH</div>
    </div>

    <div id="shop-dialog">
        <div id="shop-line" class="shop-line">こんにちは、モアイを作っています</div>
        <div class="shop-actions">
            <button id="btn-buy-moai" type="button">購入する</button>
            <button id="btn-replay-line" type="button">セリフ再生</button>
            <button id="btn-view-catalog" class="secondary wide" type="button">おすわりモアイ以外の作品も見る</button>
            <button id="btn-skip-moai" class="secondary" type="button">見送る</button>
        </div>
    </div>

    <div id="catalog-overlay">
        <button id="catalog-close" type="button">ゲームに戻る</button>
        <iframe id="catalog-frame" title="お品書き"></iframe>
    </div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
    </script>
    <script type="module" src="./main.js?v=20260701_free_roam"></script>
</body>

</html>
