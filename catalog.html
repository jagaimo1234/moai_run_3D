<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>お品書き | Kanazawa Moataro</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; }

    /* ===== HEADER ===== */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
    }
    .btn-back {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px;
      font-family: 'Outfit', sans-serif; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .header-title { font-size: 17px; font-weight: 700; letter-spacing: 2px; }
    .view-toggle { display: flex; gap: 6px; }
    .toggle-btn {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.5); width: 34px; height: 34px; border-radius: 10px;
      cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .toggle-btn.active { background: rgba(0,210,255,0.2); border-color: #00d2ff; color: #00d2ff; }

    /* ===== PAGE HERO ===== */
    .page-hero { text-align: center; padding: 28px 20px 10px; }
    .page-hero h1 {
      font-size: clamp(26px, 7vw, 44px); font-weight: 900;
      background: linear-gradient(90deg, #fff 0%, #00d2ff 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 4px; margin-bottom: 4px;
    }
    .page-hero p { font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 2px; }

    /* ===== EVENT TABS ===== */
    .event-tabs {
      display: flex; gap: 10px; padding: 16px 16px 8px;
      justify-content: center; flex-wrap: wrap;
    }
    .event-tab {
      padding: 10px 22px; border-radius: 30px; font-size: clamp(14px, 4vw, 16px);
      font-weight: 700; cursor: pointer; font-family: 'Outfit', sans-serif;
      border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.5); transition: all 0.2s; white-space: nowrap;
    }
    .event-tab.active {
      background: rgba(255,215,0,0.15); border-color: #FFD700;
      color: #FFD700; box-shadow: 0 0 16px rgba(255,215,0,0.2);
    }
    .item-count {
      text-align: center; font-size: 12px; color: rgba(255,255,255,0.3);
      padding-bottom: 6px; letter-spacing: 1px;
    }

    /* ===== TILE VIEW ===== */
    #tile-view { display: block; }
    #carousel-view { display: none; }

    .tile-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 14px; padding: 10px 16px 40px; max-width: 700px; margin: 0 auto;
    }
    .product-card-tile {
      background: linear-gradient(145deg, #141420, #1e1e2e);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 18px;
      overflow: hidden; transition: transform 0.2s;
    }
    .product-card-tile:active { transform: scale(0.97); }
    .product-info-tile { padding: 12px 14px 14px; }
    .product-name-tile { font-size: clamp(12px, 3.5vw, 15px); font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
    .tile-hint { font-size: 11px; color: rgba(0,210,255,0.5); letter-spacing: 0.5px; }
    .product-price-tile { font-size: clamp(14px, 4vw, 18px); font-weight: 900; color: #00d2ff; font-family: 'DotGothic16', sans-serif; }

    /* ===== CAROUSEL VIEW ===== */
    .carousel-wrapper { overflow: hidden; position: relative; }
    .carousel-track { display: flex; transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .carousel-slide { min-width: 100%; padding: 10px 24px 30px; display: flex; justify-content: center; }
    .product-card-large {
      background: linear-gradient(145deg, #141420, #1e1e2e);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 24px;
      overflow: hidden; max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .main-product-img { width: 100%; aspect-ratio: 1/1; object-fit: contain; background: #000; display: block; }
    .product-info-large { padding: 20px 24px 28px; }
    .product-name-large { font-size: clamp(18px, 5vw, 24px); font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
    .product-desc { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.6; margin-bottom: 16px; }
    .product-price-large { font-size: clamp(20px, 5vw, 28px); font-weight: 900; color: #00d2ff; font-family: 'DotGothic16', sans-serif; }

    /* ===== THUMBNAIL STRIP ===== */
    .thumb-strip {
      display: flex; gap: 8px; overflow-x: auto;
      padding: 12px 16px 16px; scrollbar-width: none;
    }
    .thumb-strip::-webkit-scrollbar { display: none; }
    .thumb-item {
      width: 68px; min-width: 68px; height: 68px; border-radius: 10px;
      overflow: hidden; border: 2px solid transparent;
      cursor: grab; transition: border-color 0.2s; flex-shrink: 0;
    }
    .thumb-item.active { border-color: #00d2ff; box-shadow: 0 0 8px rgba(0,210,255,0.4); }
    .thumb-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .carousel-btn-overlay {
      position: absolute;
      top: 150px; /* Mobile middle of image */
      transform: translateY(-50%);
      width: 50px; height: 50px;
      background: transparent;
      border: none; color: rgba(255,255,255,0.3);
      font-size: 50px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }
    @media (min-width: 500px) { .carousel-btn-overlay { top: 220px; } }
    .carousel-btn-overlay:hover, .carousel-btn-overlay:active {
      color: #fff; text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }
    .carousel-btn-left { left: 5px; }
    .carousel-btn-right { right: 5px; }
    .carousel-dots { display: flex; gap: 8px; align-items: center; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.25); cursor: pointer; transition: all 0.2s; }
    .dot.active { background: #00d2ff; width: 20px; border-radius: 4px; }
    .carousel-counter { text-align: center; color: rgba(255,255,255,0.3); font-size: 13px; padding-bottom: 8px; }

    /* empty state */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: rgba(255,255,255,0.3); font-size: 16px;
      grid-column: 1 / -1;
    }
    .empty-state .emoji { font-size: 48px; display: block; margin-bottom: 12px; }

    /* Badges & Admin UI */
    .badge {
      display: inline-block; padding: 4px 8px; border-radius: 12px; font-weight: bold;
      font-size: 11px; text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      box-shadow: 0 2px 6px rgba(0,0,0,0.3); pointer-events: none; white-space: nowrap;
    }
    .badge-super { background: linear-gradient(135deg, #ffcc00, #ff6600); color: #fff; }
    .badge-recommend { background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: #fff; }
    .badge-onsale { background: linear-gradient(135deg, #00b09b, #2ecc71); color: #fff; }
    .badge-few { background: linear-gradient(135deg, #f39c12, #e67e22); color: #fff; }
    .badge-soldout { background: linear-gradient(135deg, #7f8c8d, #34495e); color: #fff; }

    #admin-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center;
    }
    .admin-content {
      background: #1e1e2e; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px;
      text-align: center; border: 1px solid rgba(255,255,255,0.1);
    }
    .admin-input {
      width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white;
      box-sizing: border-box;
    }
    .admin-btn {
      background: #00d2ff; color: #000; padding: 12px 24px; border-radius: 30px;
      font-weight: bold; cursor: pointer; border: none; width: 100%;
    }
    .admin-edit-btn {
      display: none; position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,0.8); color: white; padding: 6px 12px;
      border-radius: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.4);
      z-index: 10; font-size: 13px; font-weight: bold;
    }
    .admin-edit-desc-btn {
      display: none; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 4px 12px; border-radius: 12px; font-size: 12px; cursor: pointer;
      margin-top: 8px; transition: background 0.2s;
    }
    .admin-edit-desc-btn:hover { background: rgba(255,255,255,0.15); }
    .admin-mode .admin-edit-btn { display: block; }
    .admin-mode .admin-edit-desc-btn { display: inline-block; }

    /* Announcement Box */
    .product-announcement {
      background: rgba(0, 210, 255, 0.05);
      border-left: 3px solid #00d2ff;
      padding: 12px 16px;
      border-radius: 4px 12px 12px 4px;
      margin-top: 16px;
      display: none; /* 初期状態は非表示 */
    }
    .product-announcement.has-content { display: block; }
    .announce-label {
      font-size: 11px; font-weight: 900; color: #00d2ff;
      letter-spacing: 1.5px; margin-bottom: 4px; display: flex; align-items: center; gap: 5px;
    }
    .announce-text { font-size: 13px; color: #fff; line-height: 1.5; }

    /* Epic Story UI */
    .history-epic-story {
      margin: 10px auto 20px; max-width: 600px; padding: 20px 16px;
      background: linear-gradient(180deg, rgba(20,20,30,0.8) 0%, rgba(10,10,15,0.95) 100%);
      border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 8px;
      text-align: center; position: relative;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(255,215,0,0.03);
      animation: fadeInEpic 1s ease-out;
    }
    @keyframes fadeInEpic { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .history-epic-story::before {
      content: '✦'; position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
      color: #FFD700; font-size: 18px; background: #0a0a0f; padding: 0 15px;
    }
    .epic-title {
      font-family: 'Shippori Mincho', 'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', serif;
      font-size: 18px; color: #FFD700; letter-spacing: 4px; margin-bottom: 12px; font-weight: normal;
    }
    .epic-portrait {
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
      margin: 0 auto 16px; display: block; border: 2px solid rgba(255, 215, 0, 0.4);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.15); filter: contrast(1.2) grayscale(0.2);
      background: #fff;
    }
    .epic-text {
      font-family: 'Shippori Mincho', 'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', serif;
      font-size: clamp(13px, 3.5vw, 15px); line-height: 1.6; color: rgba(255, 255, 255, 0.9);
      letter-spacing: 1px;
    }
    .epic-footer {
      margin-top: 16px; font-size: 11px; color: rgba(255,255,255,0.4);
      border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; line-height: 1.4;
    }
    /* ===== DEV STATUS FLOW ===== */
    .status-flow-container {
      margin-top: 20px; background: rgba(255,255,255,0.03);
      padding: 18px 12px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05);
    }
    .status-steps {
      display: flex; justify-content: space-between; align-items: center; position: relative;
      margin-bottom: 8px; padding: 0 10px;
    }
    .status-steps::before {
      content: ''; position: absolute; top: 12px; left: 10px; right: 10px;
      height: 2px; background: rgba(255,255,255,0.1); z-index: 1;
    }
    .status-step {
      position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 6px;
      width: 20%;
    }
    .step-dot {
      width: 24px; height: 24px; border-radius: 50%; background: #1a1a25;
      border: 2px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center;
      font-size: 10px; transition: all 0.3s;
    }
    .status-step.active .step-dot { background: #00d2ff; border-color: #00d2ff; box-shadow: 0 0 15px rgba(0,210,255,0.5); color: #000; }
    .status-step.completed .step-dot { background: rgba(0,210,255,0.2); border-color: #00d2ff; color: #00d2ff; }
    .step-label { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.4); white-space: nowrap; }
    .status-step.active .step-label { color: #00d2ff; }
    
    .status-sealed {
      background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px;
      text-align: center; border: 1px dashed rgba(255,255,255,0.2);
    }
    .sealed-label { font-size: 18px; font-weight: 900; letter-spacing: 2px; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
    .sealed-desc { font-size: 12px; opacity: 0.5; }
    
    .dev-badge-tile {
      position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7);
      border: 1px solid rgba(0,210,255,0.5); color: #00d2ff; padding: 3px 8px;
      border-radius: 6px; font-size: 10px; font-weight: 900; backdrop-filter: blur(4px);
    }

    /* ===== DEMO BUTTON & BADGE ===== */
    .btn-demo-glow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 28px;
      margin: 24px 0 16px;
      background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 50%, #8a2387 100%);
      background-size: 200% 200%;
      animation: gradientShift 4s ease infinite;
      border-radius: 50px;
      color: #fff;
      font-weight: 900;
      font-size: clamp(15px, 4vw, 18px);
      letter-spacing: 1.5px;
      text-decoration: none;
      box-shadow: 0 8px 32px rgba(0, 210, 255, 0.4);
      border: 1px solid rgba(255,255,255,0.4);
      transition: all 0.2s;
    }
    .btn-demo-glow:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 40px rgba(0, 210, 255, 0.7);
    }
    .btn-demo-glow:active {
      transform: translateY(1px) scale(0.98);
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .demo-badge-tile {
      position: absolute; top: 10px; right: 10px;
      background: linear-gradient(135deg, #00d2ff, #3a7bd5);
      border: 1px solid rgba(255,255,255,0.6); color: #fff; padding: 4px 10px;
      border-radius: 12px; font-size: 11px; font-weight: 900;
      box-shadow: 0 0 12px rgba(0,210,255,0.8);
      animation: pulseDemo 2s infinite;
      pointer-events: none;
    }
    @keyframes pulseDemo {
      0% { transform: scale(1); box-shadow: 0 0 8px rgba(0,210,255,0.6); }
      50% { transform: scale(1.05); box-shadow: 0 0 16px rgba(0,210,255,1); }
      100% { transform: scale(1); box-shadow: 0 0 8px rgba(0,210,255,0.6); }
    }

    /* ===== HOT TOPICS BOX ===== */
    .topics-container {
      margin: 16px auto 28px; max-width: 660px;
      background: linear-gradient(145deg, rgba(20,20,32,0.85), rgba(12,12,20,0.95));
      border: 1px solid rgba(0, 210, 255, 0.4);
      border-radius: 20px; padding: 22px 24px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), inset 0 0 25px rgba(0, 210, 255, 0.05);
      position: relative; overflow: hidden;
      animation: fadeInEpic 0.8s ease-out;
      text-align: left;
    }
    .topics-container::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
      background: linear-gradient(90deg, #00d2ff, #3a7bd5, #ff1361, #ffd700);
    }
    .topics-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 18px;
    }
    .topics-title {
      font-size: 16px; font-weight: 900; letter-spacing: 3px;
      background: linear-gradient(90deg, #fff, #00d2ff);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .topics-body { display: flex; flex-direction: column; gap: 16px; }
    .topic-item {
      display: flex; align-items: flex-start; gap: 14px;
      background: rgba(255,255,255,0.03); padding: 14px 18px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08); transition: transform 0.2s, background 0.2s;
    }
    .topic-item:hover {
      background: rgba(255,255,255,0.06); transform: translateY(-2px);
      border-color: rgba(0,210,255,0.3);
    }
    .topic-bullet { font-size: 22px; line-height: 1; }
    .topic-content { flex: 1; }
    .topic-headline { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 4px; line-height: 1.3; }
    .topic-sub { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.5; }
    .btn-topic-demo {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #ff1361, #fff800);
      color: #000; font-weight: 900; font-size: 12px; padding: 6px 14px; border-radius: 20px;
      text-decoration: none; box-shadow: 0 4px 15px rgba(255, 19, 97, 0.4);
      transition: all 0.2s;
    }
    .btn-topic-demo:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(255, 19, 97, 0.7); }
    .btn-topic-detail {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(0, 210, 255, 0.15); border: 1px solid rgba(0, 210, 255, 0.6);
      color: #00d2ff; font-weight: 700; font-size: 12px; padding: 6px 14px; border-radius: 20px;
      cursor: pointer; transition: all 0.2s; font-family: 'Outfit', sans-serif;
    }
    .btn-topic-detail:hover {
      background: rgba(0, 210, 255, 0.3); transform: scale(1.05); box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <a href="index.html" class="btn-back">← 戻る</a>
    <span class="header-title" id="admin-trigger" style="cursor:default;" title="お品書き">📋 お品書き</span>
    <div class="view-toggle">
      <button class="toggle-btn" id="btn-carousel" onclick="setView('carousel')" title="カルーセル">◀▶</button>
      <button class="toggle-btn active" id="btn-tile" onclick="setView('tile')" title="タイル">⊞</button>
    </div>
  </div>

  <!-- Page Hero -->
  <div class="page-hero">
    <h1>お品書き</h1>
    <p>Kanazawa Moataro</p>
  </div>

  <!-- Preview Mode Banner (shown only in ?preview mode) -->
  <div id="preview-banner" style="display:none; background:linear-gradient(90deg,rgba(241,196,15,0.15),rgba(230,126,34,0.15)); border:1px solid rgba(241,196,15,0.4); border-radius:10px; margin:0 16px 10px; padding:10px 16px; font-size:13px; color:#f1c40f; font-weight:bold; display:none; align-items:center; gap:8px;">
    🔒 管理者プレビューモード — 非公開作品を含めてすべて表示中
  </div>

  <!-- Admin Modal (Less Conspicuous) -->
  <div id="admin-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; justify-content:center; align-items:center; flex-direction:column;">
    <div style="background:#1e1e2e; padding:30px 40px; border-radius:16px; text-align:center; border:1px solid rgba(255,255,255,0.1);">
      <div style="font-size:24px; margin-bottom:20px;">👤</div>

  <script src="data.js?v=20260519_2245"></script>
  <script>
    const DEV_STATUSES = [
      { label: "💭 発掘中", desc: "アイデア・構想段階" },
      { label: "🛠 開発中", desc: "モデリング・試作段階" },
      { label: "🔧 調整中", desc: "修正・改善・検証段階" },
      { label: "✨ 完成", desc: "開発成功・完成版確定" },
      { label: "📦 販売準備中", desc: "量産・出品準備" },
      { label: "⏸🗿 封印中", desc: "一時中断・再検討中" },
      { label: "🚫🗿 封印作品", desc: "開発終了・没作品" }
    ];

    // ============================================================

    let currentEventKey = DEFAULT_EVENT;
    let currentSlide = 0;
    window.eventProductsData = {};
    window.eventConfigData = {};
    window.hiddenProductsData = {};

    // Preview mode: ?preview=moai2024 shows all products including hidden
    const IS_PREVIEW_MODE = new URLSearchParams(window.location.search).get('preview') === 'moai2024';
    if (IS_PREVIEW_MODE) {
      const banner = document.getElementById('preview-banner');
      if (banner) { banner.style.display = 'flex'; }
    }

    // ===== Build event tabs =====
    function buildTabs() {
      const container = document.getElementById('event-tabs');
      container.innerHTML = '';
      const allEvents = window.getAllEvents(window.eventConfigData);
      
      Object.entries(allEvents).forEach(([key, ev]) => {
        // Handle visibility status
        const config = window.eventConfigData[key];
        let status = ev.defaultStatus || 'public';
        if (config) {
          if (config.status) status = config.status;
          else if (config.visible === false) status = 'hidden';
        }
        
        if (status === 'hidden' && !IS_PREVIEW_MODE) return;

        const hiddenBadge = (status === 'hidden' && IS_PREVIEW_MODE)
          ? ' <span style="font-size:10px; background:rgba(231,76,60,0.3); color:#e74c3c; border-radius:4px; padding:1px 5px; vertical-align:middle;">🔒非公開</span>'
          : '';

        container.innerHTML += `
          <button class="event-tab ${key === currentEventKey ? 'active' : ''}"
                  id="tab-${key}" onclick="switchEvent('${key}')">
            ${ev.label}${hiddenBadge}
          </button>`;
      });
    }

    // ===== Switch event =====
    function switchEvent(key) {
      currentEventKey = key;
      currentSlide = 0;
      buildTabs();
      buildViews();
    }

    // ===== Build tile & carousel =====
    function buildViews() {
      const allEvents = window.getAllEvents(window.eventConfigData);
      const config = window.eventConfigData[currentEventKey];
      let status = allEvents[currentEventKey]?.defaultStatus || 'public';
      if (config) {
        if (config.status) status = config.status;
        else if (config.visible === false) status = 'hidden';
      }
      
      // In preview mode, treat hidden events like public
      const effectiveStatus = (IS_PREVIEW_MODE && status === 'hidden') ? 'public' : status;

      // --- Moai Room: special handling ---
      const moairoomView = document.getElementById('moairoom-view');
      if (currentEventKey === 'moairoom') {
        document.getElementById('tile-view').style.display = 'none';
        document.getElementById('carousel-view').style.display = 'none';
        
        // Show room only if not hidden (or if preview mode)
        if (effectiveStatus === 'hidden') {
          if (moairoomView) moairoomView.style.display = 'none';
          document.getElementById('tile-view').innerHTML = '<div class="empty-state">この部屋は現在閉鎖されています。</div>';
          document.getElementById('tile-view').style.display = 'block';
          return;
        }

        if (moairoomView) moairoomView.style.display = 'block';
        document.getElementById('item-count').innerHTML = '';
        document.getElementById('tab-hero-container').innerHTML = '';
        
        // Show debug controls in preview mode
        const debugControls = document.getElementById('moairoom-debug-controls');
        if (debugControls) debugControls.style.display = IS_PREVIEW_MODE ? 'flex' : 'none';

        // Show locked or unlocked state based on localStorage
        const unlocked = localStorage.getItem('moairoom_unlocked') === 'true';
        document.getElementById('moairoom-locked').style.display = unlocked ? 'none' : 'block';
        document.getElementById('moairoom-unlocked').style.display = unlocked ? 'block' : 'none';
        return;
      }
      if (moairoomView) moairoomView.style.display = 'none';

      let products = [];
      
      if (effectiveStatus !== 'preparing') {
        const selectedIds = window.eventProductsData ? window.eventProductsData[currentEventKey] : null;
        const allMaster = window.getFullMasterProducts(window.customProductsData);
        if (!selectedIds) {
          // Fallback to data.js hardcoded list
          products = allEvents[currentEventKey]?.products || [];
        } else {
          // Respect the order in selectedIds
          products = selectedIds
            .map(id => allMaster.find(p => p.id === id))
            .filter(p => p !== undefined);
        }
        // Filter out hidden products unless in preview mode
        if (!IS_PREVIEW_MODE) {
          products = products.filter(p => !window.hiddenProductsData[p.id]);
        }
      }
      window.currentRenderedProducts = products;

      // Item count & Tab description
      const eventData = allEvents[currentEventKey];
      if (!eventData) return;
      
      let countHtml = products.length > 0 ? `${products.length}点` : '';
      if (eventData.tabDesc) {
        countHtml += `<div style="margin-top:10px; color:rgba(255,215,0,0.8); font-size:13px; line-height:1.5; font-weight:bold;">${eventData.tabDesc.replace(/\n/g,'<br>')}</div>`;
      }
      document.getElementById('item-count').innerHTML = countHtml;

      // Hero Container
      document.getElementById('tab-hero-container').innerHTML = eventData.heroHtml || '';

      // --- Tile ---
      const tileGrid = document.getElementById('tile-grid');
      tileGrid.innerHTML = '';
      if (products.length === 0) {
        tileGrid.innerHTML = `
          <div class="empty-state">
            <span class="emoji">🚧</span>
            作品を準備中です<br>お楽しみに！
          </div>`;
      } else {
        products.forEach((p, i) => {
          const badgeHtml = `<div class="badge" id="badge-${p.id}" style="display:none;margin-right:4px;"></div>`;
          const stockHtml = `<div class="badge" id="stock-${p.id}" style="display:none;"></div>`;

          const imageHtml = p.isDev 
            ? `<img class="main-product-img" src="images/dev_placeholder.gif" style="border-radius:12px 12px 0 0; border:1px dashed rgba(255,255,255,0.1);" alt="開発中">`
            : `<img class="main-product-img" src="${p.image}" alt="${p.name.replace(/\n/g,' ')}">`;

          tileGrid.innerHTML += `
            <div class="product-card-tile" onclick="openDetail(${i})">
              <div style="position:relative;">
                ${imageHtml}
                ${p.isDev ? `<div class="dev-badge-tile">${DEV_STATUSES[parseInt(p.status) || 0].label}</div>` : ''}
                ${p.demoUrl ? `<div class="demo-badge-tile">🎮 体験版あり</div>` : ''}
              </div>
              <div class="product-info-tile">
                <div class="product-name-tile">${p.isDev ? '❓ [新作] ' : ''}${p.name.replace(/\n/g,'<br>')}</div>
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:4px;">
                  <div class="tile-hint">詳細を見る →</div>
                  <div style="display:flex; gap:4px;">
                    ${badgeHtml}
                    ${stockHtml}
                  </div>
                </div>
              </div>
            </div>`;
        });
      }

      // --- Carousel ---
      const track = document.getElementById('carousel-track');
      const dots  = document.getElementById('carousel-dots');
      track.innerHTML = '';
      dots.innerHTML  = '';
      if (products.length === 0) {
        track.innerHTML = `
          <div class="carousel-slide">
            <div style="text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3);">
              <div style="font-size:48px;margin-bottom:12px;">🚧</div>
              作品を準備中です
            </div>
          </div>`;
      } else {
        products.forEach((p, i) => {
          const extraImgs = p.images && p.images.length > 1 ? p.images : null;
          const thumbHtml = extraImgs ? `
            <div class="thumb-strip" id="thumbs-${i}">
              ${extraImgs.map((url, j) => {
                const isVid = url.toLowerCase().endsWith('.mp4') || url.toLowerCase().endsWith('.mov');
                return `
                  <div class="thumb-item ${url === p.image ? 'active' : ''}" onclick="setMainImg(${i},'${url}',this)">
                    ${isVid ? 
                      '<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#111; color:var(--accent); font-size:10px; font-weight:bold; border-radius:4px;">MOVIE</div>' :
                      `<img src="${url}" loading="lazy" alt="">`
                    }
                  </div>`;
              }).join('')}
            </div>` : '';
          
          const badgeLargeHtml = `<div class="badge" id="badge-large-${p.id}" style="display:none;"></div>`;
          const stockLargeHtml = `<div class="badge" id="stock-large-${p.id}" style="display:none;"></div>`;

          const largeImageHtml = p.isDev
            ? `<img class="main-product-img" src="images/dev_placeholder.gif" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:12px; border:1px dashed rgba(255,255,255,0.1);" alt="開発中">`
            : `<img class="main-product-img" id="main-img-${i}" src="${p.image}" alt="${p.name.replace(/\n/g,' ')}">
               <video class="main-product-img" id="main-video-${i}" style="display:none; width:100%; height:auto; aspect-ratio:1/1; object-fit:cover;" loop muted playsinline controls></video>`;

          track.innerHTML += `
            <div class="carousel-slide">
              <div class="product-card-large">
                <div style="position:relative;">
                  ${largeImageHtml}
                </div>
                ${thumbHtml}
                <div class="product-info-large">
                  <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px;">
                    <div class="product-name-large">${p.isDev ? '❓ [開発中]<br>' : ''}${p.name.replace(/\n/g,'<br>')}</div>
                    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
                      ${badgeLargeHtml}
                      ${stockLargeHtml}
                    </div>
                  </div>
                  <div class="product-desc" id="desc-text-${p.id}">${(p.desc || '').replace(/\n/g, '<br>')}</div>
                  
                  <!-- 体験版ボタン -->
                  ${p.demoUrl ? `
                    <div style="text-align: center;">
                      <a href="${p.demoUrl}" target="_blank" rel="noopener noreferrer" class="btn-demo-glow">
                        <span style="font-size: 20px;">🎮</span>
                        <span>Webで体験版をプレイ！</span>
                        <span style="font-size: 16px;">✨</span>
                      </a>
                    </div>
                  ` : ''}

                  <!-- 開発ステータスフロー -->
                  ${p.isDev ? renderStatusFlow(p.status || 0) : ''}

                  <!-- ゴールドモアイロボ限定特典解放欄 -->
                  ${p.id === 'moai_robo_mk2_gold' ? `
                    <div id="gold-secret-container" style="margin-top:20px; background:linear-gradient(135deg, rgba(255,215,0,0.08) 0%, rgba(255,165,0,0.04) 100%); border:2px solid rgba(255,215,0,0.4); border-radius:16px; padding:20px; font-family:'DotGothic16', sans-serif; box-shadow:0 8px 32px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,215,0,0.05);">
                      <!-- Locked/Initial State -->
                      <div id="gold-secret-locked" style="display: ${localStorage.getItem('gold_secret_unlocked') === 'true' ? 'none' : 'block'}; text-align:left;">
                        <div style="font-size:14px; font-weight:900; color:#ffd700; margin-bottom:8px; letter-spacing:1px; display:flex; align-items:center; gap:6px; text-shadow:0 0 8px rgba(255,215,0,0.4);">
                          <span>🔒</span> SECRET ACCESS PORT
                        </div>
                        <div style="font-size:12px; color:rgba(255,255,255,0.7); margin-bottom:14px; line-height:1.5;">
                          ヨーグルトランEXを購入プレイしてくれてありがとう！！ そんな君には、 秘密のアクセスキーで特典を解放してほしい...... ヒントは、全クリ後のエンドロールじゃ。

    // ===== Thumb Strip Drag to Scroll (PC) =====
    function enableDragScroll() {
      document.querySelectorAll('.thumb-strip').forEach(strip => {
        // Prevent touch events from bubbling up to carousel-track
        strip.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
        strip.addEventListener('touchmove', e => e.stopPropagation(), { passive: true });
        strip.addEventListener('touchend', e => e.stopPropagation());

        let isDown = false;
        let startX;
        let scrollLeft;
        
        strip.addEventListener('mousedown', (e) => {
          isDown = true;
          strip.style.cursor = 'grabbing';
          startX = e.pageX - strip.offsetLeft;
          scrollLeft = strip.scrollLeft;
        });
        strip.addEventListener('mouseleave', () => {
          isDown = false;
          strip.style.cursor = 'grab';
        });
        strip.addEventListener('mouseup', () => {
          isDown = false;
          strip.style.cursor = 'grab';
        });
        strip.addEventListener('mousemove', (e) => {
          if (!isDown) return;
          e.preventDefault();
          const x = e.pageX - strip.offsetLeft;
          const walk = (x - startX) * 2;
          strip.scrollLeft = scrollLeft - walk;
        });
      });
    }

    });

    // Save Description
    document.getElementById('desc-save-btn').addEventListener('click', async () => {
      if (!currentEditingProductId) return;
      const newText = document.getElementById('desc-textarea').value;
      const prevText = descriptionsData[currentEditingProductId];
      
      descriptionsData[currentEditingProductId] = newText;
      updateAllDescriptions();
      document.getElementById('desc-modal').style.display = 'none';

      try {
        await setDoc(doc(db, "settings", "descriptions"), descriptionsData);
      } catch (e) {
        console.error("Firestore write error:", e);
        alert("保存に失敗しました（" + e.message + "）。\nFirebaseのルール設定を確認してください。");
        descriptionsData[currentEditingProductId] = prevText;
        updateAllDescriptions();
      }
    });

    // Admin Auth Logic
    const adminModal = document.getElementById('admin-modal');
    // Secret trigger: Double click on the page hero title instead of the header
    let clicks = 0;
    document.querySelector('.page-hero h1').addEventListener('click', () => {
      clicks++;
      if (clicks >= 5) {
        if (auth.currentUser) {
          if (confirm("現在ログイン中です。管理者モードからログアウトしますか？")) {
            signOut(auth).then(() => {
              alert("ログアウトしました。一般画面に戻ります。");
            });
          }
        } else {
          adminModal.style.display = 'flex';
        }
        clicks = 0;
      }
      setTimeout(() => clicks = 0, 2000);
    });

    document.getElementById('admin-cancel-btn').addEventListener('click', () => {
      adminModal.style.display = 'none';
    });

    document.getElementById('admin-login-btn').addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, provider);
        adminModal.style.display = 'none';
        alert("Googleログインに成功しました。管理者モードを有効化しました。");
      } catch (e) {
        console.error(e);
        alert("ログイン失敗: " + e.message);
      }
    });

    onAuthStateChanged(auth, user => {
      if (user) {
        document.body.classList.add('admin-mode');
      } else {
        document.body.classList.remove('admin-mode');
      }
    });

    window.addEventListener('viewsBuilt', () => {
      updateAllStock();
      updateAllBadges();
      updateAllDescriptions();
      updateAllAnnouncements();
    });

    // ===== Author Follower (Easter Egg) =====
    const follower = document.createElement('img');
    // user.png を使用
    follower.src = 'user.png';
    follower.style.cssText = `
      position: fixed; top: 0; left: 0; width: 100px; height: 100px;
      pointer-events: none; z-index: 10000;
      opacity: 0; transition: opacity 0.5s; object-fit: contain;
      filter: contrast(1.1) brightness(1.1);
      transform: translate(-100px, -100px);
    `;
    document.body.appendChild(follower);

    // ===== Speech Bubble =====
    const bubble = document.createElement('img');
    bubble.src = 'images/history/serihu.png';
    bubble.style.cssText = `
      position: fixed; top: 0; left: 0; width: 100px;
      pointer-events: none; z-index: 10001;
      opacity: 0; transition: opacity 0.3s;
      transform: translate(-100px, -100px);
    `;
    document.body.appendChild(bubble);

    let mouseX = -100, mouseY = -100;
    let followX = -100, followY = -100;
    let isMoving = false;
    let hideTimer;

    const showFollower = (x, y) => {
      mouseX = x;
      mouseY = y;
      if (!isMoving) {
        follower.style.opacity = '0.85';
        isMoving = true;
      }
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        follower.style.opacity = '0';
        bubble.style.opacity = '0';
        isMoving = false;
      }, 2000);
    };

    window.addEventListener('mousemove', (e) => showFollower(e.clientX, e.clientY));
    window.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) {
        showFollower(e.touches[0].clientX, e.touches[0].clientY);
      }
    }, { passive: true });

    // ランダムに吹き出しを表示
    function toggleBubble() {
      // 出現確率をアップ (0.6 -> 0.3)
      if (isMoving && Math.random() > 0.3) {
        bubble.style.opacity = '1';
        setTimeout(() => { bubble.style.opacity = '0'; }, 3000);
      }
      // 間隔を短縮 (4-8秒 -> 2-5秒)
      setTimeout(toggleBubble, 2000 + Math.random() * 3000);
    }
    toggleBubble();

    function animateFollower() {
      // ぬるっと動く追従 (少し速度アップ)
      followX += (mouseX - followX) * 0.08;
      followY += (mouseY - followY) * 0.08;
      // カーソルの右下に配置
      follower.style.transform = `translate(${followX + 10}px, ${followY + 10}px)`;
      // 吹き出しを作者にもっと近づける
      bubble.style.transform = `translate(${followX - 30}px, ${followY - 65}px)`;
      requestAnimationFrame(animateFollower);
    }
    animateFollower();
  </script>
</body>
</html>
